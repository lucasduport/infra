# GitHub Container Registry token (required for private images: suivi-item, stream-share)
common:
  ghcrAuth: "<YOUR_GITHUB_TOKEN>"

# PostgreSQL root password — shared across all services that need DB access
postgres:
  rootPassword: "<GENERATE_STRONG_PASSWORD>"

gatus:
  secrets:
    DISCORD_WEBHOOK_ALL: "<YOUR_DISCORD_WEBHOOK_URL>"
    DISCORD_WEBHOOK_TV: "<YOUR_DISCORD_WEBHOOK_URL_TV>"

lldap:
  secrets:
    LLDAP_JWT_SECRET: "<GENERATE_RANDOM_JWT_SECRET>"
    LLDAP_KEY_SEED: "<GENERATE_RANDOM_KEY_SEED>"
    LLDAP_LDAP_USER_PASS: "<YOUR_LDAP_ADMIN_PASSWORD>"

streamShare:
  secrets:
    # POSTGRES_PASSWORD is auto-injected from postgres.rootPassword — do not add it here
    XTREAM_USER: "<YOUR_XTREAM_USER>"
    XTREAM_PASSWORD: "<YOUR_XTREAM_PASSWORD>"
    XTREAM_BASE_URL: "<YOUR_XTREAM_BASE_URL>"
    DISCORD_BOT_TOKEN: "<YOUR_DISCORD_BOT_TOKEN>"
    DISCORD_ADMIN_ROLE_ID: "<YOUR_DISCORD_ADMIN_ROLE_ID>"
    LDAP_BIND_PASSWORD: "<YOUR_LDAP_BIND_PASSWORD>"

vpn:
  secrets:
    # Required: session cookie secret for Headplane (min 32 characters)
    HEADPLANE_COOKIE_SECRET: "<GENERATE_RANDOM_32_CHAR_SECRET>"
    # Optional: add OIDC secrets here if you enable OIDC in headscale config

vaultwarden:
  secrets:
    # DOMAIN and DATABASE_URL are auto-computed — only set the token
    ADMIN_TOKEN: "<YOUR_VAULTWARDEN_ADMIN_TOKEN>"
    # Optional — enable mobile push notifications
    # PUSH_INSTALLATION_ID: "<YOUR_PUSH_ID>"
    # PUSH_INSTALLATION_KEY: "<YOUR_PUSH_KEY>"

suiviItem:
  secrets:
    SECRET_KEY: "<YOUR_FLASK_SECRET_KEY>"
