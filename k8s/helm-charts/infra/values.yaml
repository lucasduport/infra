# Default values for infra-stack.
infraNamespace: infra
suiviItemNamespace: suivi-item

# Variables for external configs
ingressDomain: lucasduport.cc
isDev: false

# Common labels for all resources
commonLabels:
  app.kubernetes.io/part-of: homelab
  app.kubernetes.io/managed-by: helm

# Specific configurations for multiple services
common:
  ghcrAuth: "" # GitHub token

externalDns:
  enabled: true
  proxied: true # Sets "Orange Cloud" status in Cloudflare
  target: "" # Your public IP for DNS records — set in values-dev.yaml or override at deploy time with --set externalDns.target=X.X.X.X

traefik:
  enabled: true
  tls: false # Set to false when using Cloudflare Flexible SSL (origin serves plain HTTP)
  nasIP: "192.168.1.135"
  nasPort: 81
  certResolver: "false"

hostSuffix: "" # Suffix appended to service hostnames, e.g. "-dev" → vault-dev.lucasduport.cc

postgres:
  enabled: false
  image: postgres:16-alpine
  storageSize: 50Gi
  rootPassword: ""
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"

gatus:
  enabled: false
  image: twinproduction/gatus:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}

lldap:
  enabled: false
  image: lldap/lldap:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  baseDN: "dc=lucasduport,dc=cc"
  secrets: {}

streamShare:
  enabled: false
  image: ghcr.io/lucasduport/stream-share:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}

vpn:
  enabled: false
  image: headscale/headscale:latest
  uiImage: ghcr.io/tale/headplane:latest
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}

vaultwarden:
  enabled: false
  image: vaultwarden/server:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}

suiviItem:
  enabled: false
  image: ghcr.io/lucasduport/suivi-item:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}
