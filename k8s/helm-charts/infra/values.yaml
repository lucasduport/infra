# Default values for infra-stack.
infraNamespace: infra
suiviItemNamespace: suivi-item

# Variables for external configs
ingressDomain: lucasduport.cc
isDev: false

# Common labels for all resources
commonLabels:
  app.kubernetes.io/part-of: homelab
  app.kubernetes.io/managed-by: helm

# Specific configurations for multiple services
common:
  ghcrAuth: "" # GitHub token

# Specific service configurations
externalSecrets:
  enabled: false # Enable to use ExternalSecret instead of Secret templates
  secretStoreName: vaultwarden-store # Name of the SecretStore to use

externalDns:
  enabled: true
  proxied: true # Sets "Orange Cloud" status in Cloudflare

traefik:
  enabled: true
  nasIP: "192.168.1.135"
  nasPort: 81
  certResolver: "false"

postgres:
  enabled: false
  image: postgres:16-alpine
  storageSize: 50Gi
  rootPassword: ""
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"

gatus:
  enabled: false
  image: twinproduction/gatus:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}

lldap:
  enabled: false
  image: lldap/lldap:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  baseDN: "dc=lucasduport,dc=cc"
  secrets: {}

streamShare:
  enabled: false
  image: ghcr.io/lucasduport/stream-share:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}

vpn:
  enabled: false
  image: ghcr.io/wg-easy/wg-easy:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}

vaultwarden:
  enabled: false
  image: vaultwarden/server:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}

suiviItem:
  enabled: false
  image: ghcr.io/lucasduport/suivi-item:latest
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  secrets: {}
