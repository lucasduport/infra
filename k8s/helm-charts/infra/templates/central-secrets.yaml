{{- if not .Values.externalSecrets.enabled }}
# --- LOCAL SECRETS (FOR BOOTSTRAPPING OR LOCAL DEV) ---
# This file is only used if externalSecrets.enabled is false.
# Since your repo is public, this file only contains placeholders.
# For initial bootstrap, manually create these secrets using kubectl.

{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: {{ .Values.infraNamespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.rootPassword | default "changeme" | quote }}
---
{{- end }}

{{- if .Values.vaultwarden.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: vaultwarden-secret
  namespace: {{ .Values.infraNamespace }}
type: Opaque
stringData:
  DOMAIN: "https://vault.{{ .Values.ingressDomain }}"
  ADMIN_TOKEN: {{ .Values.vaultwarden.secrets.ADMIN_TOKEN | default "changeme" | quote }}
  DATABASE_URL: "postgresql://postgres:{{ .Values.postgres.rootPassword | default "changeme" }}@postgres.{{ .Values.infraNamespace }}.svc.cluster.local:5432/vaultwarden"
---
{{- end }}
{{- end }}
