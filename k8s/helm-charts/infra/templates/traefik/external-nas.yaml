{{- if .Values.traefik.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: nas-external
  namespace: {{ .Values.infraNamespace }}
spec:
  ports:
    - protocol: TCP
      port: {{ .Values.traefik.nasPort }}
---
apiVersion: v1
kind: Endpoints
metadata:
  name: nas-external
  namespace: {{ .Values.infraNamespace }}
subsets:
  - addresses:
      - ip: {{ .Values.traefik.nasIP }}
    ports:
      - port: {{ .Values.traefik.nasPort }}
{{- end }}
