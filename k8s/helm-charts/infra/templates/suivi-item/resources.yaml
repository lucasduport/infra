{{- if .Values.suiviItem.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: suivi-item-secret
  namespace: {{ .Values.suiviItemNamespace }}
type: Opaque
stringData:
  {{- toYaml (required "suiviItem.secrets are required (defined in my-secrets.yaml)" .Values.suiviItem.secrets) | nindent 2 }}
---
apiVersion: v1
kind: Service
metadata:
  name: suivi-item
  namespace: {{ .Values.suiviItemNamespace }}
spec:
  type: ClusterIP
  selector:
    app: suivi-item
  ports:
    - name: http
      port: 80
      targetPort: 5000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: suivi-item-data
  namespace: {{ .Values.suiviItemNamespace }}
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: suivi-item
  namespace: {{ .Values.suiviItemNamespace }}
spec:
  replicas: {{ .Values.suiviItem.replicas }}
  selector:
    matchLabels:
      app: suivi-item
  template:
    metadata:
      labels:
        app: suivi-item
    spec:
      {{- with .Values.suiviItem.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      imagePullSecrets:
        - name: ghcr-io-secret
      containers:
        - name: suivi-item
          image: {{ .Values.suiviItem.image }}
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: suivi-item-secret
                  key: SECRET_KEY
            - name: PORT
              value: "5000"
            - name: FLASK_APP
              value: "src/app.py"
            - name: FLASK_DEBUG
              value: "0"
            - name: HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: data
              mountPath: /app/instance
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: suivi-item-data
{{- end }}
