{{- if .Values.externalSecrets.enabled }}
# --- SECRET STORES ---
# We create a SecretStore in each namespace that needs to pull secrets.
# All will point to the Vaultwarden instance defined by {{ .Values.ingressDomain }}

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreName }}
  namespace: {{ .Values.infraNamespace }}
spec:
  provider:
    bitwarden:
      identityServer: "https://vault.{{ .Values.ingressDomain }}/identity"
      apiUrl: "https://vault.{{ .Values.ingressDomain }}/api"
      auth:
        apiKey:
          clientId: { name: vaultwarden-api-key, key: client_id }
          clientSecret: { name: vaultwarden-api-key, key: client_secret }
---
{{- if .Values.suiviItem.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreName }}
  namespace: {{ .Values.suiviItemNamespace }}
spec:
  provider:
    bitwarden:
      identityServer: "https://vault.{{ .Values.ingressDomain }}/identity"
      apiUrl: "https://vault.{{ .Values.ingressDomain }}/api"
      auth:
        apiKey:
          # Note: You must also create the vaultwarden-api-key secret in this namespace
          clientId: { name: vaultwarden-api-key, key: client_id }
          clientSecret: { name: vaultwarden-api-key, key: client_secret }
---
{{- end }}

# --- EXTERNAL SECRETS ---

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gatus-secrets
  namespace: {{ .Values.infraNamespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef: { name: {{ .Values.externalSecrets.secretStoreName }}, kind: SecretStore }
  target: { name: gatus-secrets }
  data:
    - secretKey: DISCORD_WEBHOOK_ALL
      remoteRef: { key: gatus/config, property: discord_webhook_all }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lldap-secrets
  namespace: {{ .Values.infraNamespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef: { name: {{ .Values.externalSecrets.secretStoreName }}, kind: SecretStore }
  target: { name: lldap-secrets }
  data:
    - secretKey: LLDAP_JWT_SECRET
      remoteRef: { key: lldap/config, property: jwt_secret }
    - secretKey: LLDAP_KEY_SEED
      remoteRef: { key: lldap/config, property: key_seed }
    - secretKey: LLDAP_LDAP_USER_PASS
      remoteRef: { key: lldap/config, property: admin_pass }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vpn-secrets
  namespace: {{ .Values.infraNamespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef: { name: {{ .Values.externalSecrets.secretStoreName }}, kind: SecretStore }
  target: { name: vpn-secrets }
  data:
    - secretKey: WG_PASSWORD
      remoteRef: { key: vpn/config, property: password }
    - secretKey: PASSWORD_HASH
      remoteRef: { key: vpn/config, property: hash }
---
{{- if .Values.suiviItem.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: suivi-item-secret
  namespace: {{ .Values.suiviItemNamespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef: { name: {{ .Values.externalSecrets.secretStoreName }}, kind: SecretStore }
  target: { name: suivi-item-secret }
  data:
    - secretKey: SECRET_KEY
      remoteRef: { key: suivi-item/config, property: secret_key }
{{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stream-share-secrets
  namespace: {{ .Values.infraNamespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef: { name: {{ .Values.externalSecrets.secretStoreName }}, kind: SecretStore }
  target: { name: stream-share-secrets }
  data:
    - secretKey: XTREAM_USER
      remoteRef: { key: streamshare/config, property: xtream_user }
    - secretKey: XTREAM_PASSWORD
      remoteRef: { key: streamshare/config, property: xtream_password }
    - secretKey: XTREAM_BASE_URL
      remoteRef: { key: streamshare/config, property: xtream_base_url }
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef: { key: streamshare/config, property: discord_bot_token }
    - secretKey: POSTGRES_PASSWORD
      remoteRef: { key: postgres/config, property: root_password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-secret
  namespace: {{ .Values.infraNamespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef: { name: {{ .Values.externalSecrets.secretStoreName }}, kind: SecretStore }
  target:
    name: vaultwarden-secret
    template:
      data:
        DOMAIN: "https://vault.{{ .Values.ingressDomain }}"
        DATABASE_URL: "postgresql://postgres:{{ `{{ .db_password }}` }}@postgres.{{ .Values.infraNamespace }}.svc.cluster.local:5432/vaultwarden"
        ADMIN_TOKEN: "{{ `{{ .admin_token }}` }}"
  data:
    - secretKey: admin_token
      remoteRef: { key: vaultwarden/config, property: admin_token }
    - secretKey: db_password
      remoteRef: { key: postgres/config, property: root_password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-secrets
  namespace: {{ .Values.infraNamespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef: { name: {{ .Values.externalSecrets.secretStoreName }}, kind: SecretStore }
  target: { name: postgres-secrets }
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef: { key: postgres/config, property: root_password }
{{- end }}
