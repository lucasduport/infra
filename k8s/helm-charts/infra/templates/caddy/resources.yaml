{{- if .Values.caddy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: {{ .Values.infraNamespace }}
  labels:
    {{- toYaml .Values.commonLabels | nindent 4 }}
    app: caddy
data:
  Caddyfile: |
{{ tpl (.Files.Get "config/Caddyfile") . | indent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: caddy-secrets
  namespace: {{ .Values.infraNamespace }}
  labels:
    {{- toYaml .Values.commonLabels | nindent 4 }}
    app: caddy
type: Opaque
stringData:
  {{- toYaml (required "caddy.secrets are required (defined in my-secrets.yaml)" .Values.caddy.secrets) | nindent 2 }}
---
apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: {{ .Values.infraNamespace }}
  labels:
    {{- toYaml .Values.commonLabels | nindent 4 }}
    app: caddy
spec:
  type: ClusterIP
  selector:
    app: caddy
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: caddy-data
  namespace: {{ .Values.infraNamespace }}
  labels:
    {{- toYaml .Values.commonLabels | nindent 4 }}
    app: caddy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: caddy-config-pvc
  namespace: {{ .Values.infraNamespace }}
  labels:
    {{- toYaml .Values.commonLabels | nindent 4 }}
    app: caddy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: {{ .Values.infraNamespace }}
  labels:
    {{- toYaml .Values.commonLabels | nindent 4 }}
    app: caddy
spec:
  replicas: {{ .Values.caddy.replicas }}
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
      annotations:
        checksum/config: {{ tpl (.Files.Get "config/Caddyfile") . | sha256sum }}
    spec:
      {{- with .Values.caddy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: caddy
          image: {{ .Values.caddy.image }}
          ports:
            - name: http
              containerPort: 80
              hostPort: {{ .Values.caddy.httpPort }}
              protocol: TCP
            - name: https
              containerPort: 443
              hostPort: {{ .Values.caddy.httpsPort }}
              protocol: TCP
            - name: https-udp
              containerPort: 443
              hostPort: {{ .Values.caddy.httpsPort }}
              protocol: UDP
          envFrom:
            - secretRef:
                name: caddy-secrets
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: caddyfile
          configMap:
            name: caddy-config
        - name: caddy-data
          persistentVolumeClaim:
            claimName: caddy-data
        - name: caddy-config
          persistentVolumeClaim:
            claimName: caddy-config-pvc
{{- end }}
