{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: {{ .Values.infraNamespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.rootPassword | quote }}
---
{{- end }}

{{- if .Values.vaultwarden.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: vaultwarden-secret
  namespace: {{ .Values.infraNamespace }}
type: Opaque
stringData:
  DOMAIN: "https://vault{{ .Values.hostSuffix }}.{{ .Values.ingressDomain }}"
  ADMIN_TOKEN: {{ .Values.vaultwarden.secrets.ADMIN_TOKEN | quote }}
  DATABASE_URL: "postgresql://postgres:{{ .Values.postgres.rootPassword }}@postgres.{{ .Values.infraNamespace }}.svc.cluster.local:5432/vaultwarden"
  {{- if .Values.vaultwarden.secrets.PUSH_INSTALLATION_ID }}
  PUSH_INSTALLATION_ID: {{ .Values.vaultwarden.secrets.PUSH_INSTALLATION_ID | quote }}
  PUSH_INSTALLATION_KEY: {{ .Values.vaultwarden.secrets.PUSH_INSTALLATION_KEY | quote }}
  {{- end }}
---
{{- end }}

{{- if .Values.gatus.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: gatus-secrets
  namespace: {{ .Values.infraNamespace }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.gatus.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
{{- end }}

{{- if .Values.lldap.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: lldap-secrets
  namespace: {{ .Values.infraNamespace }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.lldap.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
{{- end }}

{{/* Headscale has no required runtime secrets — config is in the ConfigMap.
     Add OIDC client secret here if you enable OIDC in the headscale config. */}}
{{- if and .Values.vpn.enabled .Values.vpn.secrets }}
{{- if gt (len .Values.vpn.secrets) 0 }}
apiVersion: v1
kind: Secret
metadata:
  name: vpn-secrets
  namespace: {{ .Values.infraNamespace }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.vpn.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
{{- end }}
{{- end }}

{{- if .Values.streamShare.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: stream-share-secrets
  namespace: {{ .Values.infraNamespace }}
type: Opaque
stringData:
  # Auto-injected from postgres.rootPassword — do not duplicate in streamShare.secrets
  POSTGRES_PASSWORD: {{ .Values.postgres.rootPassword | quote }}
  {{- range $k, $v := .Values.streamShare.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
{{- end }}

{{- if .Values.suiviItem.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: suivi-item-secret
  namespace: {{ .Values.suiviItemNamespace }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.suiviItem.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
